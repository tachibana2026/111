<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>たちばな祭2026 - 団体データ投入ツール</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: monospace; background: #0f172a; color: #e2e8f0; padding: 40px; }
    h1 { color: #38bdf8; }
    button { background: #38bdf8; color: #0f172a; border: none; padding: 12px 24px; font-size: 16px; cursor: pointer; border-radius: 8px; font-weight: bold; }
    button:hover { background: #7dd3fc; }
    button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    #log { white-space: pre-wrap; margin-top: 20px; background: #1e293b; padding: 16px; border-radius: 8px; max-height: 600px; overflow-y: auto; }
    .success { color: #4ade80; }
    .error { color: #f87171; }
    .info { color: #38bdf8; }
    .warn { color: #fbbf24; }
  </style>
</head>
<body>
  <h1>🏫 たちばな祭2026 - 正規団体データ投入</h1>
  <p>1~3年 A~I組（計27団体）の正規データを投入します。</p>
  <p class="warn">⚠️ 既存の団体データ・メッセージデータはすべて削除されます。</p>
  <br>
  <button id="seedBtn" onclick="runSeed()">🚀 データを投入する</button>
  <div id="log"></div>

  <script>
    const supabaseUrl = 'https://lytlafmmpjjxamwutljv.supabase.co';
    const supabaseAnonKey = 'sb_publishable_dPoHJ6R5oEBcmYRNJ0u-2A_EKWDpIFW';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

    const logEl = document.getElementById('log');
    function log(msg, cls = '') {
      logEl.innerHTML += `<span class="${cls}">${msg}</span>\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    async function runSeed() {
      document.getElementById('seedBtn').disabled = true;
      logEl.innerHTML = '';
      log('=== 正規団体データ投入開始 ===', 'info');

      // Step 1: Delete existing messages
      log('\n[1/3] 既存メッセージを削除中...', 'info');
      const { error: msgErr } = await supabase.from('messages').delete().neq('id', '00000000-0000-0000-0000-000000000000');
      if (msgErr) {
        log(`  ⚠️ メッセージ削除: ${msgErr.message} (空の場合は無視)`, 'warn');
      } else {
        log('  ✅ メッセージ削除完了', 'success');
      }

      // Step 2: Delete existing groups
      log('\n[2/3] 既存団体データを削除中...', 'info');
      const { error: delErr } = await supabase.from('groups').delete().neq('id', '00000000-0000-0000-0000-000000000000');
      if (delErr) {
        log(`  ❌ 団体削除エラー: ${delErr.message}`, 'error');
        log('\n⚠️ RLSポリシーの制限により削除できませんでした。', 'error');
        log('Supabase SQL Editorで以下のSQLを直接実行してください:', 'warn');
        log('\n--- 以下をコピーして実行 ---', 'warn');
        log(generateSQL(), '');
        document.getElementById('seedBtn').disabled = false;
        return;
      }
      log('  ✅ 団体データ削除完了', 'success');

      // Step 3: Insert new group data
      log('\n[3/3] 正規団体データを投入中...', 'info');
      const groups = generateGroups();
      const { data, error } = await supabase.from('groups').insert(groups).select();

      if (error) {
        log(`  ❌ 投入エラー: ${error.message}`, 'error');
        log('\n⚠️ RLSポリシーの制限により挿入できませんでした。', 'error');
        log('Supabase SQL Editorで以下のSQLを直接実行してください:', 'warn');
        log('\n--- 以下をコピーして実行 ---', 'warn');
        log(generateSQL(), '');
        document.getElementById('seedBtn').disabled = false;
        return;
      }

      log(`\n✅ ${data.length}件の団体データを正常に投入しました！`, 'success');
      log('\n--- 投入された団体一覧 ---', 'info');
      data.sort((a, b) => a.login_id.localeCompare(b.login_id));
      for (const g of data) {
        log(`  ${g.login_id.padEnd(3)} | ${g.name.padEnd(6)} | ${g.department} | ${g.building} ${g.room} | PW: ${g.password}`);
      }
      log('\n=== 完了 ===', 'success');
    }

    function generateGroups() {
      const grades = ['1', '2', '3'];
      const classes = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I'];
      const groups = [];
      for (const grade of grades) {
        for (let i = 0; i < classes.length; i++) {
          const cls = classes[i];
          groups.push({
            login_id: `${grade}${cls}`,
            password: `tachibana${grade}${cls}`,
            name: `${grade}年${cls}組`,
            department: grade === '1' ? '体験' : '食品',
            grade: `${grade}年`,
            building: '南館',
            room: `${grade}-${i + 1}`,
            description: '',
            waiting_time: 0,
            status: 'open',
            editing_locked: false,
            social_links: {},
          });
        }
      }
      return groups;
    }

    function generateSQL() {
      const groups = generateGroups();
      let sql = 'DELETE FROM messages;\nDELETE FROM groups;\n\n';
      sql += 'INSERT INTO groups (login_id, password, name, department, grade, building, room, description, waiting_time, status, editing_locked, social_links) VALUES\n';
      const values = groups.map(g => 
        `('${g.login_id}', '${g.password}', '${g.name}', '${g.department}', '${g.grade}', '${g.building}', '${g.room}', '', 0, 'open', false, '{}')`
      );
      sql += values.join(',\n') + ';';
      return sql;
    }
  </script>
</body>
</html>
